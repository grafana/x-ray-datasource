name: Run commands when issues are labeled
on:
  issues:
    types: [labeled, unlabeled]
permissions: {}
jobs:
  main:
    permissions:
      contents: read
      id-token: write # Required by create-github-app-token
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Actions
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: 'grafana/grafana-github-actions'
          path: ./actions
          ref: 3c62d35c5a66e730186a338e45aeb8fa784e2d56
          persist-credentials: false
      - name: Install Actions
        working-directory: ./actions
        run: corepack yarn install --immutable --mode=skip-build
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: aws-ds-token-creator
      - name: Run Commands
        uses: ./actions/commands
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
          configPath: issue_commands
